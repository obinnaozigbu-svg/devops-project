name: Deploy Website

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Adding EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 51.20.117.64 >> ~/.ssh/known_hosts

      - name: Copy files to the server
        run: scp -r ./index.html ubuntu@51.20.117.64:/var/www/html

      - name: Deployment Success
        run: echo "Deployment completed successfully"
