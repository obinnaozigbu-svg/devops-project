name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Adding EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 51.20.43.183 >> ~/.ssh/known_hosts

      - name: Prepare server
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@51.20.43.183 "
            sudo apt update &&\
            sudo apt install nginx -y &&\
            sudo mkdir -p /var/www/html
            sudo chown -R ubuntu:ubuntu /var/www/html
          "

      - name: Deploy to EC2 without downtime
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@51.20.43.183 "
            set -e  #Exit if any command fails

            #Ensure release folder exists
            mkdir -p /var/www/releases

            #Create a unique release folder with timestamp
            RELEASE_DIR=/var/www/releases/release-$(date +%s)
            mkdir -p \$RELEASE_DIR
            echo "Deploying to:" \$RELEASE_DIR

            #Upload all files to the new release
            rsync -av --delete ~/devops-project/web/ \$RELEASE_DIR

            #Update symblinkk so that Nginx servers the new release
            ln -sfn \$RELEASE_DIR /var/www/html
            echo "Deployment complete"

            #Keep last 3 releases, delete older ones
            ls -dt /var/www/releases/* | tail -n +4 | xargs rm -rf
          "
